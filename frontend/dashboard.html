
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Progress Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#eef2f7;}
.container{
width:900px;margin:auto;margin-top:30px;
background:white;padding:25px;border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}
h2{text-align:center;}
table{width:100%;margin-top:20px;border-collapse:collapse;}
td,th{padding:10px;border:1px solid #ccc;text-align:center;}
</style>
</head>

<body>

<div class="container">

<h2>📊 Student Progress Analytics</h2>

<table>
<thead>
<tr>
<th>Attempt</th>
<th>Performance</th>
<th>Timestamp</th>
</tr>
</thead>
<tbody id="historyTable"></tbody>
</table>

<canvas id="trendChart"></canvas>

</div>

<script>

let user = localStorage.getItem("user")

if(!user){
window.location="login.html"
}

fetch("http://127.0.0.1:5000/history/"+user)
.then(res=>res.json())
.then(data=>{

let labels=[]
let scores=[]

data.forEach((r,i)=>{

historyTable.innerHTML +=
`<tr>
<td>${i+1}</td>
<td>${r.performance}</td>
<td>${r.time}</td>
</tr>`

labels.push("Attempt "+(i+1))

// convert performance → numeric
if(r.performance=="Low") scores.push(1)
if(r.performance=="Medium") scores.push(2)
if(r.performance=="High") scores.push(3)

})

new Chart(document.getElementById("trendChart"),{

type:'line',

data:{
labels:labels,
datasets:[{
label:'Learning Progress Trend',
data:scores,
borderColor:'blue',
fill:false,
tension:0.3
}]
},

options:{
scales:{
y:{
ticks:{
callback:function(value){
if(value==1) return "Low"
if(value==2) return "Medium"
if(value==3) return "High"
}
},
min:1,
max:3
}
}
}

})

})

</script>

</body>
</html>
