<!DOCTYPE html>
<html>
<head>
<title>Student Login</title>

<style>
body{
font-family:Arial;
background:linear-gradient(to right,#667eea,#764ba2);
}

.box{
width:350px;
margin:auto;
margin-top:100px;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
text-align:center;
}

input{
width:90%;
padding:10px;
margin:8px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:95%;
padding:10px;
margin:5px;
background:#667eea;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#5a67d8;
}
</style>

</head>

<body>

<div class="box">

<h2>Student Login</h2>

<input id="user" placeholder="Username">
<input id="pass" placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="register()">Register</button>

</div>

<script>

function login(){

fetch("http://127.0.0.1:5000/login",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
username:user.value,
password:pass.value
})
})
.then(res=>res.json())
.then(data=>{
if(data.status=="success"){

localStorage.setItem("user", user.value)   // ⭐ VERY IMPORTANT

alert("Login Success")
window.location="index.html"

}else{
alert("Invalid Login")
}
})

}

function register(){

fetch("http://127.0.0.1:5000/register",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
username:user.value,
password:pass.value
})
})
.then(res=>res.json())
.then(data=>{
alert("Registered Successfully")
})

}

</script>

</body>
</html>
