<!DOCTYPE html>
<html>
<head>
<title>AI Learning Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:linear-gradient(to right,#4facfe,#00f2fe);
}

.container{
width:950px;
margin:auto;
margin-top:25px;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

input{
width:100%;
padding:10px;
margin:5px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#4facfe;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#009efd;
}

.result{
margin-top:15px;
padding:12px;
background:#e6fffa;
border-radius:6px;
min-height:80px;
}

.dashboard{
display:flex;
gap:20px;
margin-top:20px;
}

.card{
flex:1;
background:#f7fafc;
padding:15px;
border-radius:8px;
text-align:center;
font-weight:bold;
font-size:18px;
}

.topbar{
display:flex;
justify-content:space-between;
margin-bottom:15px;
}

canvas{
background:white;
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<div class="topbar">
<h2>🎓 AI Personalized Learning System</h2>
<button onclick="logout()" style="width:120px;background:#ff5c5c">Logout</button>
</div>

<input id="attendance" placeholder="Attendance %">
<input id="assignment" placeholder="Assignment Score">
<input id="quiz" placeholder="Quiz Score">
<input id="hours" placeholder="Study Hours">
<input id="video" placeholder="Video Watch Time">
<input id="prev" placeholder="Previous Result">
<input id="attempts" placeholder="Attempts">
<input id="participation" placeholder="Participation">

<button onclick="predict()">Generate Learning Plan</button>
<button onclick="goDashboard()">View Progress Dashboard</button>

<div id="output" class="result">Result will appear here...</div>

<div class="dashboard">
<div class="card" id="perfCard">Performance: -</div>
<div class="card">AI Recommendation Active</div>
</div>

<canvas id="scoreChart"></canvas>

</div>

<script>

let chart

function predict(){

let user = localStorage.getItem("user")

if(!user){
alert("Login first")
window.location="login.html"
return
}

let att = Number(attendance.value)
let assign = Number(assignment.value)
let qz = Number(quiz.value)
let hrs = Number(hours.value)

output.innerHTML = "Processing..."

fetch("http://127.0.0.1:5000/predict",{

method:"POST",
headers:{'Content-Type':'application/json'},

body:JSON.stringify({

username:user,
attendance:att,
assignment_score:assign,
quiz_score:qz,
study_hours:hrs,
video_watch_time:Number(video.value),
previous_result:Number(prev.value),
attempts:Number(attempts.value),
participation:Number(participation.value)

})

})
.then(res=>res.json())
.then(data=>{

perfCard.innerHTML = "Performance: " + data.performance

let text = "<h3>Recommended Plan</h3>"
data.recommendations.forEach(r=>{
text += "• "+r+"<br>"
})

output.innerHTML = text

drawChart(att, assign, qz, hrs)

})

}

function drawChart(att, assign, qz, hrs){

if(chart) chart.destroy()

chart = new Chart(document.getElementById("scoreChart"),{

type:'bar',
data:{
labels:['Attendance','Assignment','Quiz','Study Hours'],
datasets:[{
label:'Student Metrics',
data:[att,assign,qz,hrs],
backgroundColor:['#4facfe','#43e97b','#fa709a','#f6d365']
}]
},

options:{
responsive:true
}

})

}

function goDashboard(){
window.location="dashboard.html"
}

function logout(){
localStorage.removeItem("user")
window.location="login.html"
}

</script>

</body>
</html>
